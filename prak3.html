<!DOCTYPE html>
<html>
<head>
    <title>Praktikum Web - Daftar Barang</title>
    <style>
        body {
            font-family: Harrington, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #3D74B6;
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            color: rgb(251, 245, 222);
            margin: 0 0 10px 0;
        }

        .logo-box {
            background-color: rgb(255, 246, 246);
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
            
        }
.logo-box img {
    height: 250px;
    width: 250px;
}
        nav {
            background-color: #DC3C22;
            text-align: center;
            padding: 10px 0;
        }

        nav a {
            color: #FBF5DE;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #DC3C22;
        }

        th {
            padding: 10px;
            background-color: #EAC8A6;
        }

        td {
            padding: 10px;
            height: 150px; 
        }

        .img-produk {
            width: 150px;
            height: auto;
        }

        footer {
            background-color: #3D74B6;
            color: #FBF5DE;
            text-align: center;
            padding: 15px 0;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Juragan Elektronik</h1>
        <div class="logo-box">
            <img src="logo.png" alt="Logo" width="120">
        </div>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Kontak</a>
    </nav>

    <div class="container">
        <h2>Daftar Barang</h2>
        <h3>Tabel Harga Produk</h3>

        <table>
            <tr>
                <th>Kode Produk</th>
                <th>Nama Produk</th>
                <th>Harga</th>
                <th>Gambar</th>
            </tr>
            <tr>
                <td>P001</td>
                <td>Kipas Angin</td>
                <td>400.000</td>
                <td><img src="kipasangin.jpg" class="img-produk" alt="Kipas Angin"></td>
            </tr>
            <tr>
                <td>P002</td>
                <td>Lemari Es</td>
                <td>1.700.000</td>
                <td><img src="lemari_es.jpg" class="img-produk" alt="Lemari Es"></td>
            </tr>
            <tr>
                <td>P003</td>
                <td>Mesin Cuci</td>
                <td>2.000.000</td>
                <td><img src="mesincuci.jpg" class="img-produk" alt="Mesin Cuci"></td>
            </tr>
        </table>
    </div>

    <footer>
        &copy;Ikoowl
    </footer>

</body>
</html>
