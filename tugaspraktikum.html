<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Foodcourt Nusantara</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }
        header {
            background: orange;
            text-align: center;
            padding: 20px;
            color: white;
        }
        header img {
            width: 200px;
            border-radius: 10px;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        img.menu {
            width: 120px;
        }
        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Foodcourt Nusantara</h1>
    <!-- Gambar JPG -->
    <img src="FoudCourt.png" alt="Foodcourt">
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Kontak</a>
</nav>

<h2 style="text-align:center;">Daftar Menu</h2>

<table>
    <tr>
        <th>No</th>
        <th>Nama Makanan</th>
        <th>Harga</th>
        <th>Gambar</th>
    </tr>
    <tr>
        <td>1</td>
        <td>Nasi Goreng</td>
        <td>Rp 20.000</td>
        <td><img class="menu" src="nasigoreng.jpg" alt="Nasi Goreng"></td>
    </tr>
    <tr>
        <td>2</td>
        <td>Mie Ayam</td>
        <td>Rp 15.000</td>
        <td><img class="menu" src="mie ayam.jpg" alt="Mie Ayam"></td>
    </tr>
    <tr>
        <td>3</td>
        <td>Sate Ayam</td>
        <td>Rp 25.000</td>
        <td><img class="menu" src="sate ayam.jpg" alt="Sate Ayam"></td>
    </tr>
</table>

<footer>
    <p>&copy; Ikoowl</p>
</footer>

</body>
</html>
